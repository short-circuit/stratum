name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  WEBKIT_DISABLE_DMABUF_RENDERER: 1
  WEBKIT_DISABLE_COMPOSITING_MODE: 1

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Perl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install strawberryperl --no-progress -y 2>$null
          $perl = Get-Command perl.exe -ErrorAction SilentlyContinue | Select -ExpandProperty Source
          if (-not $perl) { $perl = "C:\Strawberry\perl\bin\perl.exe" }
          echo "PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPENSSL_SRC_PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Tauri app
        shell: bash
        run: |
          set -o pipefail
          TMP="${RUNNER_TEMP//\\//}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            APPIMAGE_EXTRACT_AND_RUN=1 npx tauri build --bundles appimage 2>&1 | tee "$TMP/tauri-build.log"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            APPLE_SIGNING_IDENTITY="${APPLE_SIGNING_IDENTITY:--}" npx tauri build --bundles app 2>&1 | tee "$TMP/tauri-build.log"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            RUSTFLAGS="" npx tauri build --no-bundle 2>&1 | tee "$TMP/tauri-build.log"
          fi
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Show build output
        run: |
          find target/release -maxdepth 1 -type f -name "stratum*" 2>/dev/null || echo "no binary"
          find target/release/bundle -type f 2>/dev/null || echo "no bundle files"

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/bundle/**/*
            target/release/stratum-tauri*
          if-no-files-found: warn

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-log
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Add Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" 2>/dev/null || true
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"
          [ ! -d "$NDK_PATH" ] && NDK_PATH="$ANDROID_HOME/ndk/29.0.14206865"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "CC_armv7_linux_androideabi=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_armv7_linux_androideabi=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "CC_x86_64_linux_android=$TOOLCHAIN/bin/x86_64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_x86_64_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "CC_i686_linux_android=$TOOLCHAIN/bin/i686-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_i686_linux_android=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_i686_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init
          fi

      - name: Build Android app
        shell: bash
        run: npx tauri android build --target aarch64 --debug 2>&1 | tee ${{ runner.temp }}/tauri-build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            src-tauri/gen/android/**/*.apk
            src-tauri/gen/android/**/*.aab
          if-no-files-found: warn

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-log
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Add iOS targets
        run: |
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize iOS project
        run: |
          if [ ! -d "src-tauri/gen/ios" ]; then
            npx tauri ios init
          fi

      - name: Patch Xcode project for system libraries
        run: |
          PBX="${{ github.workspace }}/src-tauri/gen/apple/stratum-tauri.xcodeproj/project.pbxproj"
          if [ ! -f "$PBX" ]; then
            echo "Xcode project not found at $PBX" >&2
            exit 1
          fi
          sed -i '' 's/\$(inherited)/-lz -liconv &/g' "$PBX"
          echo "Patched Xcode project OTHER_LDFLAGS"

      - name: Build iOS app
        shell: bash
        run: |
          npx tauri ios build --target aarch64-sim --ci 2>&1 | tee ${{ runner.temp }}/tauri-build.log; exit ${PIPESTATUS[0]}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            src-tauri/gen/ios/**/*.app
            src-tauri/gen/ios/**/*.ipa
          if-no-files-found: warn

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-log
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

  release:
    needs: [desktop, android, ios]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-x86_64/**/*
            macos-x86_64/**/*
            windows-x86_64/**/*
            android/**/*
            ios/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
