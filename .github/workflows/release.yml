name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  WEBKIT_DISABLE_DMABUF_RENDERER: 1
  WEBKIT_DISABLE_COMPOSITING_MODE: 1

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: false

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/release/.fingerprint
            target/release/build
            target/release/deps
            target/release/.cargo-lock
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Perl (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install strawberryperl --no-progress -y 2>$null
          $perl = Get-Command perl.exe -ErrorAction SilentlyContinue | Select -ExpandProperty Source
          if (-not $perl) { $perl = "C:\Strawberry\perl\bin\perl.exe" }
          echo "PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "OPENSSL_SRC_PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Tauri app
        shell: bash
        run: |
          set -o pipefail
          TMP="${RUNNER_TEMP//\\//}"
          if [ "${{ runner.os }}" = "Linux" ]; then
            APPIMAGE_EXTRACT_AND_RUN=1 npx tauri build --bundles appimage 2>&1 | tee "$TMP/tauri-build.log"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            APPLE_SIGNING_IDENTITY="${APPLE_SIGNING_IDENTITY:--}" npx tauri build --bundles app 2>&1 | tee "$TMP/tauri-build.log"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            RUSTFLAGS="" npx tauri build --no-bundle 2>&1 | tee "$TMP/tauri-build.log"
          fi
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Zip macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd target/release/bundle/macos
          APP_NAME=$(ls -d *.app | head -1)
          if [ -n "$APP_NAME" ]; then
            ditto -c -k --keepParent "$APP_NAME" "${APP_NAME%.app}.zip"
          fi

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/macos/*.zip
            target/release/stratum-tauri.exe
          if-no-files-found: warn

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-log
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/release/.fingerprint
            target/release/build
            target/release/deps
            target/release/.cargo-lock
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Add Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" 2>/dev/null || true
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"
          [ ! -d "$NDK_PATH" ] && NDK_PATH="$ANDROID_HOME/ndk/29.0.14206865"
          TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "CC_armv7_linux_androideabi=$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_armv7_linux_androideabi=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "CC_x86_64_linux_android=$TOOLCHAIN/bin/x86_64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_x86_64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_x86_64_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "CC_i686_linux_android=$TOOLCHAIN/bin/i686-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_i686_linux_android=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_i686_linux_android=$TOOLCHAIN/bin/llvm-ranlib" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src-tauri/gen/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Apply Android patches
        run: |
          cp -r src-tauri/android-patches/app/src/main/* src-tauri/gen/android/app/src/main/

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > ${{ runner.temp }}/android.keystore
            echo "ANDROID_KEYSTORE_PATH=${{ runner.temp }}/android.keystore" >> $GITHUB_ENV
          fi

      - name: Build Android app
        shell: bash
        run: npx tauri android build --target aarch64 --apk 2>&1 | tee ${{ runner.temp }}/tauri-build.log; exit ${PIPESTATUS[0]}
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign APK with apksigner
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PATH" ] || [ ! -f "$ANDROID_KEYSTORE_PATH" ]; then
            echo "No keystore found, skipping APK signing"
            exit 0
          fi
          APK=$(find src-tauri/gen/android -name '*.apk' -type f | head -1)
          if [ -n "$APK" ]; then
            echo "Signing $APK..."
            APKSIGNER=$(ls $ANDROID_SDK_ROOT/build-tools/*/apksigner | sort -V | tail -1)
      "$APKSIGNER" sign \
        --ks "$ANDROID_KEYSTORE_PATH" \
        --ks-type PKCS12 \
        --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
        --ks-key-alias "$ANDROID_KEY_ALIAS" \
        --key-pass "pass:$ANDROID_KEY_PASSWORD" \
        "$APK"
            echo "Signed APK: $APK"
          else
            echo "No APK found to sign"
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            src-tauri/gen/android/**/*.apk
            src-tauri/gen/android/**/*.aab
          if-no-files-found: warn

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-log
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/release/.fingerprint
            target/release/build
            target/release/deps
            target/release/.cargo-lock
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Add iOS targets
        run: |
          rustup target add \
            aarch64-apple-ios \
            aarch64-apple-ios-sim \
            x86_64-apple-ios

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize iOS project
        run: |
          if [ ! -d "src-tauri/gen/ios" ]; then
            npx tauri ios init
          fi

      - name: Patch Xcode project & build
        shell: bash
        run: |
          python3 -c "import sys;c=open(sys.argv[1]).read();c=c.replace('VALID_ARCHS = arm64;','VALID_ARCHS = arm64;\n\t\t\t\tOTHER_LDFLAGS = \"-lz -liconv\";');open(sys.argv[1],'w').write(c)" "${{ github.workspace }}/src-tauri/gen/apple/stratum-tauri.xcodeproj/project.pbxproj"
          npx tauri ios build --target aarch64-sim --ci 2>&1 | tee ${{ runner.temp }}/tauri-build.log; exit ${PIPESTATUS[0]}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Zip iOS app
        shell: bash
        run: |
          cd src-tauri/gen/apple/build
          APP_PATH=$(find . -name "*.app" -maxdepth 3 | head -1)
          if [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH")
            ditto -c -k --keepParent "$APP_PATH" "${APP_NAME%.app}.zip"
          fi

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            src-tauri/gen/apple/build/**/*.zip
          if-no-files-found: warn

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-log
          path: ${{ runner.temp }}/tauri-build.log
          if-no-files-found: warn

  release:
    needs: [desktop, android, ios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p assets

          APPIMAGE=$(find linux-x86_64 -name '*.AppImage' -type f 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" assets/stratum-pkm-linux.AppImage
          fi

          MACOS_ZIP=$(find macos-x86_64 -name '*.zip' -type f 2>/dev/null | head -1)
          if [ -n "$MACOS_ZIP" ]; then
            cp "$MACOS_ZIP" assets/stratum-pkm-macos.zip
          fi

          if [ -f windows-x86_64/stratum-tauri.exe ]; then
            cp windows-x86_64/stratum-tauri.exe assets/stratum-pkm-windows.exe
          fi

          APK=$(find android -name '*.apk' -type f 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" assets/stratum-pkm-android.apk
          fi

          AAB=$(find android -name '*.aab' -type f 2>/dev/null | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" assets/stratum-pkm-android.aab
          fi

          if [ -f ios/stratum.zip ]; then
            cp ios/stratum.zip assets/stratum-pkm-ios.zip
          fi

          ls -la assets/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
