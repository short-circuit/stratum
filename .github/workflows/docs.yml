name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mkdocs-material

      - name: Build docs
        env:
          NO_MKDOCS_2_WARNING: "true"
        run: |
          mkdocs build -f docs/mkdocs.yml
          # Move built site into a docs/ subdirectory so it lives at
          # https://short-circuit.github.io/stratum/docs/
          # leaving gh-pages root free for the future landing page.
          # site_dir: ../site puts output at repo-root/site/
          mkdir -p gh-pages-output
          mv site gh-pages-output/docs
          # Copy landing page to root of gh-pages
          cp docs/landing/index.html gh-pages-output/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-output
          keep_files: false
