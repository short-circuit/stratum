name: Install Linux dependencies
description: Install system packages required for Tauri builds on Linux (webkit, gtk, openssl, etc.)

runs:
  using: composite
  steps:
    - name: Install system packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          librsvg2-dev \
          libssl-dev \
          pkg-config
